<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevator Fall</title>
    <link href="site.css" rel="stylesheet" />

<!--<body style="">-->
<body style="background: fixed; background-color: #3d5369; background-image: url(../Images/jezric-background.png); background-position: top left; background-repeat: no-repeat; ">

    <div id="logodiv" class="MainTable" style="padding-top:20px;">
        <table width="100%">
            <tr>
                <td>
                    <center>

                        <table id="mainContentTable">
                            <tr>
                                <td style="border-top:solid 1px Gray;padding-bottom:30px;">

                                    <center><h1>Jezric Software</h1></center>

                                </td>
                            </tr>
                        </table>

                    </center>
                </td>
            </tr>
        </table>

    </div>


    <script src="../Scripts/jquery-3.3.1.js"></script>

    <script src="../Scripts/bootstrap.js"></script>

    <script language="javascript">


            $(document).ready(function () {
                SetMainTable();
            });

            $(window).resize(function () {
                SetMainTable();
            });


            function SetMainTable()
            {
                if ($(window).width() >= Number(800))
                {
                    $(mainContentTable).width(750);
                }
                else
                {
                    $(mainContentTable).width(300);
                }
            }

    </script>

</body>
