<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <style type="text/css">

        .container > * {
            color: white;
            font-size: 80px;
            text-align: center;
            text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.1);
            padding: 10px;
            border: 2px solid;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color:black;
        }

        .container {
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            height: 100vh;

            background: blue;
            padding: 10px;
            box-sizing: border-box;
        }

        .a, .b, .c, .d {
            height: 50%;
            width: 50%;
        }

        @media all and (max-width: 500px) {
            .a, .b, .c, .d {
                width: 100%;
                /*height: 25%;*/
            }

            .b {
                order: 2;
            }
        }
    </style>
    <title></title>
</head>
<body>

    <img src="../Images/title_ef.png" />

    <div class="container">
        <div class="a">a</div>
        <div class="b">b</div>
        <div class="c">c</div>
        <div class="d">d</div>
    </div>

</body>
</html>
